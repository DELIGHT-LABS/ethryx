[advisories]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",                # webpki-roots ships Mozilla CA bundle under CDLA
    "ISC",
    "MIT",
    "Unicode-3.0",
]

# `ring` ships a custom multi-license LICENSE bundle that cargo-deny cannot
# auto-classify. The upstream file covers ISC / MIT / OpenSSL terms.
[[licenses.clarify]]
crate = "ring"
expression = "ISC AND (MIT OR OpenSSL)"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
